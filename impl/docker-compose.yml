version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: eos_user
      POSTGRES_PASSWORD: eos_password
      POSTGRES_DB: engineeringos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/eos_neo4j_password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  api:
    build: .
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://eos_user:eos_password@db:5432/engineeringos
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=eos_neo4j_password
      - JWT_SECRET_KEY=sua-chave-super-secreta-em-producao-mudar
    depends_on:
      - db
      - redis
      - neo4j

  celery_worker:
    build: .
    command: celery -A src.celery_worker.celery_app worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://eos_user:eos_password@db:5432/engineeringos
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=eos_neo4j_password
    depends_on:
      - db
      - redis
      - neo4j

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
