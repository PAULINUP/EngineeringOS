version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: eos_user
      POSTGRES_PASSWORD: eos_password
      POSTGRES_DB: engineeringos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://eos_user:eos_password@db:5432/engineeringos
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=sua-chave-super-secreta-em-producao-mudar
    depends_on:
      - db
      - redis

  celery_worker:
    build: .
    command: celery -A src.celery_worker.celery_app worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://eos_user:eos_password@db:5432/engineeringos
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  redis_data:
